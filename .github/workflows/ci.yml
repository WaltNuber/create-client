name: CI

on:
  pull_request:
  release:
      types: [created]

jobs:
  build:
    strategy:
      matrix:
        node-version: ['lts/*', 'current']

    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: pnpm/action-setup@v2
      with:
        version: 8
    - name: Build Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'pnpm'
    - run: pnpm install
    - run: pnpm run build
    - run: pnpm test
    - run: pnpm run lint
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - run: pnpm run test-gen
    - run: pnpm run test-next-app
    - run: pnpm run test-react-app
    - run: pnpm run test-vue-app
    - env:
        NODE_OPTIONS: --openssl-legacy-provider
      run: pnpm run test-nuxt-app
    - run: pnpm run test-gen-env
    - run: pnpm run test-gen-openapi3
    - run: pnpm run eslint-check
    - uses: actions/upload-artifact@v3
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
